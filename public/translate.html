<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translate · PI</title>
    <meta name="description" content="Minimal live translation interface." />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <main class="translate-shell">
      <header class="translate-topbar">
        <a class="back" href="/setup">← PI</a>
        <div class="mode-pill" id="modeText">Chinese → English</div>
      </header>

      <section class="translate-board">
        <article class="translation-panel original-panel">
          <div class="panel-label">Original</div>
          <div class="stage-text" id="originalText">Waiting.</div>
        </article>

        <div class="horizontal-divider" aria-hidden="true">
          <span></span>
          <button id="toggleBtn" class="canvas-control" type="button">Start</button>
        </div>

        <article class="translation-panel translated-panel">
          <div class="panel-label">Translation</div>
          <div class="stage-text" id="translatedText">Translation.</div>
        </article>
      </section>

      <footer class="translate-footer">
        <div id="status" class="status tiny-status">Ready.</div>
        <button id="clearBtn" class="ghost-btn">Clear</button>
      </footer>
    </main>
  </body>
</html>
