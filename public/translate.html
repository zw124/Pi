<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translate · PI</title>
    <meta name="description" content="Minimal live translation interface." />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
  </head>
  <body>
    <main class="translate-shell">
      <header class="translate-topbar">
        <a class="back" href="/setup">← PI</a>
        <button id="toggleBtn" class="mini-pill">Start / End</button>
      </header>

      <section class="translate-viewport">
        <div class="left-rail">
          <div class="kicker">Mode</div>
          <div class="rail-text" id="modeText">School · Chinese → English</div>
          <div class="kicker rail-gap">Noise</div>
          <div class="rail-text" id="noiseText">Quiet</div>
        </div>

        <div class="split-line"></div>

        <div class="right-stage">
          <div class="stage-half upper" id="originalText">Waiting.</div>
          <div class="stage-half lower" id="translatedText">Translation.</div>
        </div>
      </section>

      <div id="status" class="status tiny-status">Ready.</div>
      <button id="clearBtn" class="ghost-btn">Clear</button>
    </main>
  </body>
</html>
